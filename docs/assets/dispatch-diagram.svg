<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" rx="8" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="monospace" font-size="13" fill="#8888aa" letter-spacing="1">DAG DISPATCH</text>

  <!-- User prompt bubble -->
  <rect x="250" y="54" width="300" height="36" rx="18" fill="#16213e" stroke="#334155" stroke-width="1"/>
  <text x="400" y="77" text-anchor="middle" font-family="monospace" font-size="13" fill="#e2e8f0">"plan a REST API"</text>

  <!-- Arrow from prompt to Wave 0 -->
  <line x1="400" y1="90" x2="400" y2="120" stroke="#334155" stroke-width="1.5"/>
  <polygon points="395,118 400,126 405,118" fill="#334155"/>

  <!-- Wave 0 label -->
  <text x="60" y="165" font-family="monospace" font-size="11" fill="#64748b">Wave 0</text>
  <text x="60" y="179" font-family="monospace" font-size="10" fill="#475569">parallel</text>

  <!-- Wave 0 nodes -->
  <!-- Planner -->
  <rect x="140" y="140" width="130" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="205" y="162" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#60a5fa">Planner</text>
  <text x="205" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">break down tasks</text>

  <!-- Developer -->
  <rect x="290" y="140" width="130" height="50" rx="8" fill="#1a3a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="355" y="162" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#4ade80">Developer</text>
  <text x="355" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">scaffold code</text>

  <!-- Tester -->
  <rect x="440" y="140" width="130" height="50" rx="8" fill="#2e1a3a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="505" y="162" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#c084fc">Tester</text>
  <text x="505" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">write test plan</text>

  <!-- Writer -->
  <rect x="590" y="140" width="130" height="50" rx="8" fill="#3a2e1a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="655" y="162" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#fbbf24">Writer</text>
  <text x="655" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">draft docs</text>

  <!-- Dashed separator -->
  <line x1="60" y1="210" x2="740" y2="210" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Wave 1 label -->
  <text x="60" y="260" font-family="monospace" font-size="11" fill="#64748b">Wave 1</text>
  <text x="60" y="274" font-family="monospace" font-size="10" fill="#475569">depends on</text>
  <text x="60" y="286" font-family="monospace" font-size="10" fill="#475569">Wave 0</text>

  <!-- Reviewer -->
  <rect x="310" y="240" width="180" height="50" rx="8" fill="#1e2a3f" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="400" y="262" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#22d3ee">Reviewer</text>
  <text x="400" y="278" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">review all outputs</text>

  <!-- Dependency arrows from Wave 0 to Wave 1 -->
  <!-- Planner -> Reviewer -->
  <line x1="205" y1="190" x2="355" y2="240" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <polygon points="351,236 355,244 359,236" fill="#3b82f6" opacity="0.5"/>

  <!-- Developer -> Reviewer -->
  <line x1="355" y1="190" x2="385" y2="240" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <polygon points="381,236 385,244 389,236" fill="#22c55e" opacity="0.5"/>

  <!-- Tester -> Reviewer -->
  <line x1="505" y1="190" x2="430" y2="240" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <polygon points="426,236 430,244 434,236" fill="#a855f7" opacity="0.5"/>

  <!-- Writer -> Reviewer -->
  <line x1="655" y1="190" x2="445" y2="240" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <polygon points="441,236 445,244 449,236" fill="#f59e0b" opacity="0.5"/>

  <!-- Result -->
  <line x1="400" y1="290" x2="400" y2="320" stroke="#334155" stroke-width="1.5"/>
  <polygon points="395,318 400,326 405,318" fill="#334155"/>

  <rect x="280" y="330" width="240" height="36" rx="18" fill="#16213e" stroke="#22d3ee" stroke-width="1" opacity="0.7"/>
  <text x="400" y="353" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">done — all tasks complete</text>
</svg>