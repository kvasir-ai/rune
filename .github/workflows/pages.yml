name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - site/assets/**
      - src/rune-agency/**
      - src/cli/**
      - src/cli/site/**
      - .github/workflows/pages.yml
      - pyproject.toml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install rune
        run: python -m pip install .

      - name: Build site
        run: rune --source-dir . system site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
