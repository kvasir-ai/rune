# Peon-ping sound pack profiles
#
# Three tiers: low, mid, high. Each tier maps to sound packs.
# Model IDs are matched to tiers via the model_tiers section below.
#
# Add your own profiles or modify existing ones.
# Apply with: make configure-peon PEON_PROFILES=warcraft,redalert

# ── Model-to-tier mapping ──────────────────────────────────────────
# Each entry is a substring matched case-insensitively against the model ID.
# First match wins. Unknown models fall back to the default tier.
#
# Examples:
#   "claude-sonnet-4" matches "sonnet" → mid
#   "gpt-4o-mini" matches "mini" → low
#   "deepseek-r1" matches "deepseek" → mid (if added below)

model_tiers:
  low:
    - haiku
    - mini
    - flash
    - small
    - nano
  mid:
    - sonnet
    - gpt-4o
    - gemini-pro
    - deepseek
    - medium
    - mistral
    - llama
    - command-r
  high:
    - opus
    - o1
    - o3
    - gpt-4-turbo
    - gemini-ultra
    - large
  default: mid

# ── Sound pack profiles ────────────────────────────────────────────
# low:  workers, grunts, low-tier units
# mid:  mid-tier units, soldiers, vehicles
# high: heroes, commanders, bosses

warcraft:
