# Auto-lint rules — loaded by auto-lint.py
#
# Each rule maps a file extension to one or more commands that run after a file write.
# Commands run in order. If a command is not found on PATH, it is silently skipped.
#
# Fields:
#   extension:       File extension (without dot)
#   commands:  List of commands to run. Use {file} as placeholder for the file path.
#   timeout:   Max seconds per command (default: 10)
#   condition: Optional — only run if this file exists relative to project root.
#              Use for tools that require a project context (e.g., sqlfluff needs dbt_project.yml).
#
# Add your own rules or modify existing ones.

# ── Python ─────────────────────────────────────────────────────────

- extension: py
  commands:
    - "ruff check --fix {file}"
    - "ruff format {file}"
  timeout: 10

# ── SQL ────────────────────────────────────────────────────────────

- extension: sql
  commands:
    - "sqlfluff fix --force {file}"
  timeout: 10
  condition: dbt/dbt_project.yml

- extension: sqlx
  commands:
    - "sqlfluff fix --force {file}"
  timeout: 10
  condition: dbt/dbt_project.yml

# ── Go ─────────────────────────────────────────────────────────────

- extension: go
  commands:
    - "goimports -w {file}"
  timeout: 10

# ── Terraform ──────────────────────────────────────────────────────

- extension: tf
  commands:
    - "terraform fmt {file}"
  timeout: 10

# ── Add your own rules below ──────────────────────────────────────
# Examples:
