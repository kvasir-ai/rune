# yaml-language-server: $schema=../schemas/hooks-meta.schema.json
# Hook event bindings — wires each hook to platform events.
# profiles.yaml controls WHICH hooks are active; this defines HOW they fire.
#
# Mirrors the role of mcps.yaml for MCPs: both platforms share the same hook
# names, but the command paths differ per platform.
#
# Hook commands are resolved at configure time:
#   claude:   $HOME/.claude/hooks/<name>.py
#   opencode: $HOME/.config/opencode/hooks/<name>.py

safety-check:
  description: Block dangerous commands before execution
  events:
    PreToolUse:
      matcher: Bash
      timeout: 10

auto-lint:
  description: Auto-format files after writes
  events:
    PostToolUse:
      matcher: "Write|Edit"
      timeout: 30

on-stage-complete:
  description: Pipeline stage guidance on agent stop
  events:
    SubagentStop:
      timeout: 30
    Stop:
      timeout: 30
