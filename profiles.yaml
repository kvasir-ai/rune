# yaml-language-server: $schema=schemas/profiles.schema.json

# Agents and skills are auto-discovered — ALL deploy to every profile regardless of what is listed here.
# This file controls which RULES deploy to each profile.
# Rules under global_rules deploy to every profile. Profile-specific rules add on top.

global_rules:
  licensing:
    - open-source-license-compliance

default:
  description: Default profile with DAG execution and project management support
  rules:
    collaboration:
      - dag-execution-format
      - knowledge-management
      - ai-toolkit-operations
      - project-planning
      - architectural-decision-records
      - design-patterns
  hooks:
    - safety-check

